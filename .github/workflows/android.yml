name: Build APK

# Builds the debug APK and publishes it to a GitHub Release so it can be
# downloaded directly (no 30 MB chat limit, full FFmpeg + both ABIs).
on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # The GitHub ubuntu runner ships the Android SDK pre-installed. Just accept
      # licenses (avoids the flaky setup-android emulator download that broke CI).
      - name: Accept Android SDK licenses
        run: |
          SDKMGR=$(find "$ANDROID_SDK_ROOT/cmdline-tools" -name sdkmanager -type f | head -1)
          yes | "$SDKMGR" --licenses > /dev/null 2>&1 || true

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk Stick-debug.apk

      # Always available from the run's "Artifacts" section.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stick-debug-apk
          path: Stick-debug.apk

      # Stable download link: github.com/<owner>/Stick/releases/tag/latest-debug
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: Latest debug build
          prerelease: true
          files: Stick-debug.apk
